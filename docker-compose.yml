services:
  db:
    image: postgres:15-alpine
    container_name: pomelo_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-pomelo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-pomelo}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: pomelo_backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: pomelo_frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
